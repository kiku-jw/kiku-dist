# GitLab CI - Complete pipeline for kiku-dist
# All logic is in kiku-dist CLI, this just calls it

stages:
  - check
  - release
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_BUILDKIT: "1"

.python_setup: &python_setup
  image: python:3.11-slim
  before_script:
    - pip install .

# Doctor check
doctor:
  <<: *python_setup
  stage: check
  script:
    - kiku-dist doctor --ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG

# Release (manual trigger for version bump)
release:
  <<: *python_setup
  stage: release
  image: python:3.11
  before_script:
    - apt-get update && apt-get install -y git nodejs npm
    - pip install .
    - git config user.email "ci@kikuai.dev"
    - git config user.name "CI Bot"
  script:
    - |
      if [ -z "$BUMP_TYPE" ]; then
        echo "BUMP_TYPE not set (patch|minor|major)"
        exit 1
      fi
    - kiku-dist release $BUMP_TYPE
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  variables:
    BUMP_TYPE: "patch"  # Override in UI

# Publish to GitHub
publish_gh:
  <<: *python_setup
  stage: publish
  image: python:3.11
  before_script:
    - apt-get update && apt-get install -y curl
    - pip install .
    # Install gh CLI
    - curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
    - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
    - apt-get update && apt-get install -y gh
  script:
    - kiku-dist publish --targets gh
  rules:
    - if: $CI_COMMIT_TAG

# Container build and push
publish_container:
  stage: publish
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache python3 py3-pip
    - pip3 install --break-system-packages .
    # Setup buildx
    - docker buildx create --use --name builder
    # Login to registries
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - |
      if [ -n "$DOCKERHUB_TOKEN" ]; then
        echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      fi
  script:
    - kiku-dist publish --targets container
  rules:
    - if: $CI_COMMIT_TAG

# Documentation deploy
publish_docs:
  <<: *python_setup
  stage: publish
  before_script:
    - apt-get update && apt-get install -y nodejs npm
    - pip install . mkdocs-material
  script:
    - kiku-dist publish --targets docs
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - docs/**/*
        - mkdocs.yml
        - openapi.yaml
